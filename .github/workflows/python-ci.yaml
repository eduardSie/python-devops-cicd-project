name: CI/CD for simple-https-checker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  

jobs:
  lint-and-static-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"
    - name: Run tests
      run: |
        black --check .
        ruff check .
    - name: Static type and security checks
      run: |
        mypy src/
        bandit -c pyproject.toml -r .
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '${{ matrix.python-version }}'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"
    - name: Run tests
      run: |
        pytest tests/
  build-and-upload:
    runs-on: ubuntu-latest
    needs: 
      [lint-and-static-test, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: |
        python -m build
    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: simple-https-checker-package-${{ github.sha}}
        path: dist/